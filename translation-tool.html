<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translation Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-muted: #f0ede8;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text-primary: #1a1a18;
      --text-secondary: #5a5a56;
      --text-muted: #9a9994;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-bg: #eff6ff;
      --accent-text: #1e40af;
      --success-bg: #f0fdf4;
      --success-text: #166534;
      --danger-text: #b91c1c;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --surface: #2a2a27;
        --surface-muted: #232320;
        --border: rgba(255,255,255,0.09);
        --border-strong: rgba(255,255,255,0.16);
        --text-primary: #f0ede8;
        --text-secondary: #a8a59e;
        --text-muted: #6a6862;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --accent-bg: #1e3a5f;
        --accent-text: #93c5fd;
        --success-bg: #14532d;
        --success-text: #86efac;
        --danger-text: #f87171;
        --shadow: 0 1px 4px rgba(0,0,0,0.3);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .container { width: 100%; max-width: 760px; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .header-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon i { font-size: 20px; color: var(--accent); }
    .header h1 { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .header p { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

    /* Language row */
    .lang-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .lang-row select {
      flex: 1;
      height: 38px;
      padding: 0 10px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    .lang-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }

    .swap-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 0.5px solid var(--border-strong);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, transform 0.2s;
      color: var(--text-secondary);
    }
    .swap-btn:hover { background: var(--surface-muted); }
    .swap-btn:active { transform: rotate(180deg); }
    .swap-btn i { font-size: 17px; }

    /* Panels */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 540px) { .panels { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      padding: 10px 14px 9px;
      border-bottom: 0.5px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .char-count { font-size: 12px; color: var(--text-muted); }
    .detected-badge {
      font-size: 11px;
      background: var(--success-bg);
      color: var(--success-text);
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: 500;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-primary);
      line-height: 1.65;
      min-height: 170px;
    }
    textarea::placeholder { color: var(--text-muted); }

    .output-area {
      flex: 1;
      min-height: 170px;
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .placeholder-txt { color: var(--text-muted); font-style: italic; }

    .panel-footer {
      padding: 8px 12px;
      border-top: 0.5px solid var(--border);
      display: flex; gap: 6px; justify-content: flex-end;
      align-items: center;
      min-height: 40px;
    }

    .icon-btn {
      width: 30px; height: 30px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      color: var(--text-secondary);
    }
    .icon-btn:hover { background: var(--surface-muted); }
    .icon-btn i { font-size: 15px; }

    /* Actions */
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .translate-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 0 22px; height: 40px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
    }
    .translate-btn:hover { background: var(--accent-hover); }
    .translate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .translate-btn i { font-size: 16px; }

    .clear-btn {
      padding: 0 16px; height: 40px;
      border: 0.5px solid var(--border-strong);
      background: transparent;
      border-radius: var(--radius);
      font-size: 14px; color: var(--text-secondary);
      cursor: pointer; font-family: inherit;
      transition: background 0.12s;
    }
    .clear-btn:hover { background: var(--surface-muted); }

    .status {
      font-size: 13px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Keyboard hint */
    .hint {
      font-size: 12px; color: var(--text-muted);
      margin-left: auto;
    }
    kbd {
      display: inline-flex; align-items: center;
      padding: 1px 5px;
      border: 0.5px solid var(--border-strong);
      border-radius: 4px;
      font-size: 11px; font-family: inherit;
      background: var(--surface-muted);
    }

    /* Toast */
    .copy-toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--text-primary); color: var(--surface);
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .copy-toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-icon"><i class="ti ti-language"></i></div>
    <div>
      <h1>Language Translator</h1>
      <p>Powered by Claude AI &mdash; 24 languages</p>
    </div>
  </div>

  <div class="lang-row">
    <select id="src-lang" aria-label="Source language">
      <option value="auto">Detect language</option>
      <option value="English">English</option>
      <option value="Spanish">Spanish</option>
      <option value="French">French</option>
      <option value="German">German</option>
      <option value="Italian">Italian</option>
      <option value="Portuguese">Portuguese</option>
      <option value="Russian">Russian</option>
      <option value="Chinese (Simplified)">Chinese (Simplified)</option>
      <option value="Chinese (Traditional)">Chinese (Traditional)</option>
      <option value="Japanese">Japanese</option>
      <option value="Korean">Korean</option>
      <option value="Arabic">Arabic</option>
      <option value="Hindi">Hindi</option>
      <option value="Bengali">Bengali</option>
      <option value="Dutch">Dutch</option>
      <option value="Polish">Polish</option>
      <option value="Turkish">Turkish</option>
      <option value="Swedish">Swedish</option>
      <option value="Greek">Greek</option>
      <option value="Hebrew">Hebrew</option>
      <option value="Indonesian">Indonesian</option>
      <option value="Thai">Thai</option>
      <option value="Vietnamese">Vietnamese</option>
    </select>

    <button class="swap-btn" id="swap-btn" title="Swap languages" aria-label="Swap languages">
      <i class="ti ti-switch-horizontal"></i>
    </button>

    <select id="tgt-lang" aria-label="Target language">
      <option value="Spanish">Spanish</option>
      <option value="English">English</option>
      <option value="French">French</option>
      <option value="German">German</option>
      <option value="Italian">Italian</option>
      <option value="Portuguese">Portuguese</option>
      <option value="Russian">Russian</option>
      <option value="Chinese (Simplified)">Chinese (Simplified)</option>
      <option value="Chinese (Traditional)">Chinese (Traditional)</option>
      <option value="Japanese">Japanese</option>
      <option value="Korean">Korean</option>
      <option value="Arabic">Arabic</option>
      <option value="Hindi">Hindi</option>
      <option value="Bengali">Bengali</option>
      <option value="Dutch">Dutch</option>
      <option value="Polish">Polish</option>
      <option value="Turkish">Turkish</option>
      <option value="Swedish">Swedish</option>
      <option value="Greek">Greek</option>
      <option value="Hebrew">Hebrew</option>
      <option value="Indonesian">Indonesian</option>
      <option value="Thai">Thai</option>
      <option value="Vietnamese">Vietnamese</option>
    </select>
  </div>

  <div class="panels">
    <!-- Source panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label" id="src-label">Source</span>
        <span class="char-count" id="char-count">0 / 2000</span>
      </div>
      <textarea
        id="input-text"
        placeholder="Enter text to translate…"
        maxlength="2000"
        aria-label="Text to translate"
        spellcheck="true"
      ></textarea>
      <div class="panel-footer">
        <button class="icon-btn" id="listen-src-btn" title="Listen to source text" aria-label="Listen to source text">
          <i class="ti ti-volume"></i>
        </button>
      </div>
    </div>

    <!-- Translation panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label" id="tgt-label">Translation</span>
        <span id="detected-badge"></span>
      </div>
      <div class="output-area" id="output-text" aria-live="polite" aria-label="Translated text">
        <span class="placeholder-txt">Translation will appear here…</span>
      </div>
      <div class="panel-footer">
        <button class="icon-btn" id="copy-btn" title="Copy translation" aria-label="Copy translated text">
          <i class="ti ti-copy"></i>
        </button>
        <button class="icon-btn" id="listen-tgt-btn" title="Listen to translation" aria-label="Listen to translation">
          <i class="ti ti-volume"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="translate-btn" id="translate-btn">
      <i class="ti ti-language"></i>
      Translate
    </button>
    <button class="clear-btn" id="clear-btn">Clear</button>
    <span class="status" id="status"></span>
    <span class="hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to translate</span>
  </div>

</div>

<div class="copy-toast" id="copy-toast" role="status">Copied to clipboard!</div>

<script>
  // ── DOM refs ──────────────────────────────────────────────────────────────
  const inputEl      = document.getElementById('input-text');
  const outputEl     = document.getElementById('output-text');
  const srcLangSel   = document.getElementById('src-lang');
  const tgtLangSel   = document.getElementById('tgt-lang');
  const translateBtn = document.getElementById('translate-btn');
  const clearBtn     = document.getElementById('clear-btn');
  const charCount    = document.getElementById('char-count');
  const statusEl     = document.getElementById('status');
  const copyBtn      = document.getElementById('copy-btn');
  const swapBtn      = document.getElementById('swap-btn');
  const toast        = document.getElementById('copy-toast');
  const srcLabel     = document.getElementById('src-label');
  const tgtLabel     = document.getElementById('tgt-label');
  const detectedBadge = document.getElementById('detected-badge');
  const listenSrcBtn = document.getElementById('listen-src-btn');
  const listenTgtBtn = document.getElementById('listen-tgt-btn');

  // ── State ─────────────────────────────────────────────────────────────────
  let lastTranslation = '';
  let lastDetected    = '';

  // ── Language → BCP-47 map (for TTS) ──────────────────────────────────────
  const langCode = {
    'English': 'en', 'Spanish': 'es', 'French': 'fr', 'German': 'de',
    'Italian': 'it', 'Portuguese': 'pt', 'Russian': 'ru', 'Japanese': 'ja',
    'Korean': 'ko', 'Chinese (Simplified)': 'zh-CN', 'Chinese (Traditional)': 'zh-TW',
    'Arabic': 'ar', 'Hindi': 'hi', 'Bengali': 'bn', 'Dutch': 'nl',
    'Polish': 'pl', 'Turkish': 'tr', 'Swedish': 'sv', 'Greek': 'el',
    'Hebrew': 'he', 'Indonesian': 'id', 'Thai': 'th', 'Vietnamese': 'vi'
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function updateLabels() {
    const s = srcLangSel.options[srcLangSel.selectedIndex].text;
    const t = tgtLangSel.options[tgtLangSel.selectedIndex].text;
    srcLabel.textContent = (s === 'Detect language') ? 'Source' : s;
    tgtLabel.textContent = t;
  }

  function showToast(msg = 'Copied to clipboard!') {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function speak(text, lang) {
    if (!text || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (langCode[lang]) utter.lang = langCode[lang];
    window.speechSynthesis.speak(utter);
  }

  function resetOutput() {
    outputEl.innerHTML = '<span class="placeholder-txt">Translation will appear here…</span>';
    lastTranslation = '';
    detectedBadge.textContent = '';
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    const len = inputEl.value.length;
    charCount.textContent = len + ' / 2000';
    if (!inputEl.value.trim()) { resetOutput(); statusEl.innerHTML = ''; }
  });

  inputEl.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      doTranslate();
    }
  });

  srcLangSel.addEventListener('change', updateLabels);
  tgtLangSel.addEventListener('change', updateLabels);

  swapBtn.addEventListener('click', () => {
    const srcVal = srcLangSel.value;
    const tgtVal = tgtLangSel.value;
    if (srcVal === 'auto') return; // can't swap when auto-detecting

    const srcOpts = Array.from(srcLangSel.options).map(o => o.value);
    const tgtOpts = Array.from(tgtLangSel.options).map(o => o.value);

    if (tgtOpts.includes(srcVal)) tgtLangSel.value = srcVal;
    if (srcOpts.includes(tgtVal)) srcLangSel.value = tgtVal;

    // carry translation into input
    if (lastTranslation) {
      inputEl.value = lastTranslation;
      charCount.textContent = lastTranslation.length + ' / 2000';
      resetOutput();
    }
    updateLabels();
  });

  clearBtn.addEventListener('click', () => {
    inputEl.value = '';
    charCount.textContent = '0 / 2000';
    resetOutput();
    statusEl.innerHTML = '';
    inputEl.focus();
  });

  copyBtn.addEventListener('click', () => {
    if (!lastTranslation) return;
    navigator.clipboard.writeText(lastTranslation)
      .then(() => showToast())
      .catch(() => showToast('Copy failed'));
  });

  listenSrcBtn.addEventListener('click', () => speak(inputEl.value, srcLangSel.value));
  listenTgtBtn.addEventListener('click', () => speak(lastTranslation, tgtLangSel.value));

  // ── Core: call Claude API ─────────────────────────────────────────────────
  async function doTranslate() {
    const text = inputEl.value.trim();
    if (!text) { inputEl.focus(); return; }

    const src = srcLangSel.value;
    const tgt = tgtLangSel.value;

    // Guard: same language (skip if not auto-detect)
    if (src !== 'auto' && src === tgt) {
      outputEl.textContent = text;
      lastTranslation = text;
      return;
    }

    translateBtn.disabled = true;
    statusEl.innerHTML = '<div class="spinner"></div><span>Translating…</span>';
    outputEl.innerHTML = '<span class="placeholder-txt">Translating…</span>';
    detectedBadge.textContent = '';

    const systemPrompt = `You are a professional translator. Translate text accurately and naturally, preserving tone and formatting.
Respond ONLY with a valid JSON object — no markdown, no explanation, no extra text:
{
  "translation": "<translated text here>",
  "detected_language": "<name of the source language>"
}`;

    const userMsg = src === 'auto'
      ? `Detect the language and translate this text into ${tgt}:\n\n${text}`
      : `Translate this text from ${src} into ${tgt}:\n\n${text}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMsg }]
        })
      });

      if (!res.ok) throw new Error(`API error ${res.status}`);

      const data = await res.json();
      const raw  = data.content?.find(b => b.type === 'text')?.text ?? '';

      let parsed;
      try {
        parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      } catch {
        // fallback: treat entire response as translation text
        parsed = { translation: raw.trim(), detected_language: '' };
      }

      lastTranslation = parsed.translation ?? '';
      lastDetected    = parsed.detected_language ?? '';

      outputEl.textContent = lastTranslation;
      statusEl.innerHTML   = '';

      if (src === 'auto' && lastDetected) {
        detectedBadge.innerHTML =
          `<span class="detected-badge">Detected: ${lastDetected}</span>`;
      }

    } catch (err) {
      console.error(err);
      outputEl.innerHTML =
        `<span style="color:var(--danger-text)">Translation failed: ${err.message}. Check your API key and try again.</span>`;
      statusEl.innerHTML = '';
    }

    translateBtn.disabled = false;
  }

  translateBtn.addEventListener('click', doTranslate);

  // ── Init ──────────────────────────────────────────────────────────────────
  updateLabels();
</script>
</body>
</html>
